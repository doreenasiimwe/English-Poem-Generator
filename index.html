<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />

    <title>AI English Poem Generator</title>
  </head>
  <body>
    <header>
      <h1>AI English Poem Generator</h1>
    </header>

    <main>
      <form>
        <input
          type="text"
          placeholder="Enter the topic of the English poem"
          autofocus
          required
          autocomplete="off" />
        <input type="submit" />
      </form>
      <div>
        Every man is a piece of the continent,
        <br />
        A part of the main.
      </div>
    </main>
    <footer>
      This Project was coded by
      <a href="https://github.com/doreenasiimwe" target="_blank"
        >Asiimwe Doreen</a
      >
      is
      <a
        href="https://github.com/doreenasiimwe/English-Poem-Generator"
        target="_blank"
        >open-sourced on GitHub</a
      >
      and
      <a
        href="https://english-poem-generator-liart.vercel.app//"
        target="_blank"
        >Hosted on Vercel</a
      >
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
